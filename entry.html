<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./app-config.js"></script>
<script>
(async () => {
  const cfg = await window.SentinelGuestConfig.load();
  if (window.location.hostname === 'ainadevelop.github.io') {
    window.location.replace(cfg.bookingOrigin + window.location.pathname.replace(/^\/detector\/guest/, '') + window.location.search + window.location.hash);
  }
})();
</script>
<meta name="description" content="HAVEN smart stay operations and entry management">
<meta property="og:site_name" content="HAVEN">
<meta property="og:type" content="website">
<meta property="og:title" content="HAVEN">
<meta property="og:description" content="HAVEN smart stay operations and entry management">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2712%27 fill=%27%231D9E75%27/%3E%3Cpath d=%27M18 33l9 9 19-20%27 stroke=%27white%27 stroke-width=%276%27 fill=%27none%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27/%3E%3C/svg%3E">
<title>チェックイン処理中 - HAVEN</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, #1D9E75 0%, #0F6E56 100%); color: #fff; font-family: system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; padding: 2rem; }
.loader { width: 64px; height: 64px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.title { font-size: 28px; font-weight: 600; margin-bottom: 1rem; }
.subtitle { font-size: 16px; color: rgba(255,255,255,0.8); margin-bottom: 4rem; }
.result { font-size: 18px; font-weight: 500; margin-bottom: 2rem; }
.icon { width: 80px; height: 80px; margin: 2rem auto; }
.error-msg { color: #FFB6B6; font-size: 14px; margin-top: 1rem; }
.btn-back { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: #fff; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; cursor: pointer; margin-top: 1rem; display: inline-block; }
.btn-back:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="container">
  <div class="title">HAVEN</div>
  <div id="state">
    <div class="subtitle">チェックイン処理中...</div>
    <div class="loader"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const paymentId = params.get('pi');
let guestConfig = window.SentinelGuestConfig.defaults;

async function processEntry() {
  if (!paymentId) {
    showError('有効なQRコードではありません');
    return;
  }

  try {
    guestConfig = await window.SentinelGuestConfig.load();
    const res = await fetch(`${guestConfig.apiBaseUrl}/api/entry/verify-qr`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_id: paymentId })
    });

    const data = await res.json();

    if (res.ok && data.status === 'ok') {
      showSuccess('チェックインが完了しました。\nドアが解錠されました。');
      setTimeout(() => {
        window.location.href = 'complete.html?pi=' + encodeURIComponent(paymentId);
      }, 2000);
    } else {
      showError(extractErrorMessage(data));
    }
  } catch (error) {
    showError('通信エラー: ' + error.message);
  }
}

function extractErrorMessage(data) {
  if (!data || typeof data !== 'object') {
    return 'チェックイン処理に失敗しました';
  }
  if (typeof data.message === 'string' && data.message) {
    return data.message;
  }
  if (typeof data.detail === 'string' && data.detail) {
    return data.detail;
  }
  if (data.detail && typeof data.detail.message === 'string' && data.detail.message) {
    return data.detail.message;
  }
  if (data.detail && typeof data.detail.error === 'string' && data.detail.error) {
    return data.detail.error;
  }
  return 'チェックイン処理に失敗しました';
}

function showError(message) {
  const state = document.getElementById('state');
  state.innerHTML = `
    <div class="result" style="color: #FFB6B6;">❌ エラー</div>
    <div class="subtitle">${message}</div>
    <div class="subtitle" style="margin-top:0.5rem; font-size:13px; color:rgba(255,255,255,0.6);">解決しない場合はサポートへお問い合わせください。</div>
    <a class="btn-back" href="support.html">お問い合わせ</a>
    <a class="btn-back" href="javascript:history.back()" style="margin-left:8px;">戻る</a>
  `;
}

function showSuccess(message) {
  const state = document.getElementById('state');
  state.innerHTML = `
    <div class="result">✅ 完了</div>
    <div class="subtitle">${message}</div>
  `;
}

processEntry();
</script>
</body>
</html>
