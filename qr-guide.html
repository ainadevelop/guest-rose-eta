<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入室QRコード | 梅田屋</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      box-sizing: border-box;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #4a90e2;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #4a90e2;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #357abd;
    }

    #qr-section {
      display: none;
      margin-top: 32px;
    }

    #qr-section.visible {
      display: block;
    }

    .qr-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin: 0 auto 12px;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      border: 4px solid #f0f0f0;
    }

    .booking-id {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      letter-spacing: 3px;
      margin-top: 8px;
    }

    .notice {
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
      line-height: 1.6;
    }

    .reset-btn {
      margin-top: 12px;
      background: #f0f0f0;
      color: #666;
      font-size: 13px;
      padding: 10px;
    }

    .reset-btn:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠 梅田屋</div>
    <div class="subtitle">入室QRコード発行</div>

    <div id="input-section">
      <label for="booking-input">予約番号を入力してください</label>
      <input
        type="text"
        id="booking-input"
        placeholder="例: ABC12345"
        maxlength="20"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
      >
      <button onclick="generateQR()">QRコードを表示</button>
    </div>

    <div id="qr-section">
      <div class="qr-label">入室用QRコード</div>
      <div id="qrcode"></div>
      <div class="booking-id" id="booking-display"></div>
      <div class="notice">このQRコードをドアのリーダーにかざしてください。<br>有効期限はチェックアウト日までです。</div>
      <button class="reset-btn" onclick="resetForm()">別の予約番号を入力</button>
    </div>
  </div>

  <script>
    let qrInstance = null;

    function generateQR() {
      const input = document.getElementById('booking-input');
      const value = input.value.trim().toUpperCase();

      if (!value) {
        input.focus();
        input.style.borderColor = '#e74c3c';
        setTimeout(() => { input.style.borderColor = '#e0e0e0'; }, 1500);
        return;
      }

      // QRコードをクリア
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      // QR生成
      qrInstance = new QRCode(qrContainer, {
        text: value,
        width: 220,
        height: 220,
        colorDark: '#1a1a1a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('booking-display').textContent = value;
      document.getElementById('input-section').style.display = 'none';
      document.getElementById('qr-section').classList.add('visible');
    }

    function resetForm() {
      document.getElementById('booking-input').value = '';
      document.getElementById('qr-section').classList.remove('visible');
      document.getElementById('input-section').style.display = 'block';
      document.getElementById('qrcode').innerHTML = '';
    }

    // Enterキー対応
    document.getElementById('booking-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generateQR();
    });
  </script>
</body>
</html>
